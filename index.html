<!DOCTYPE html>
<html lang="fr" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recherche d'API</title>
    <link rel="shortcut icon" type="image/x-icon" href="favicon-js.ico" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <!-- HERO SECTION -->
    <header id="hero">
      <div class="hero-content">
        <h1>Recherche d'API</h1>
        <p>Explorez des milliers d'APIs publiques gratuites</p>
        
        <div id="bloc-recherche">
          <input type="text" placeholder="Ex : Pokémon, Météo, News..." />
          <button id="btn-lancer-recherche" type="button" class="btn_clicable" title="Lancer la recherche">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.35-4.35"></path>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <!-- MAIN CONTENT -->
    <main id="conteneur">
      <!-- SECTION RÉSULTATS -->
      <section id="section-resultats">
        <div id="bloc-gif-attente">
          <img src="images/attente-ajax.gif" alt="Chargement" width="50" />
        </div>

        <div id="bloc-resultats">
          <p class="info-vide">ici : afficher les différentes categories</p>
        </div>
      </section>

      <!-- SECTION FAVORIS (DÉROULABLE) -->
      <aside id="section-favoris">
        <button id="btn-toggle-favoris" class="toggle-btn" aria-expanded="false">
          <span class="toggle-icon">▼</span>
          <span class="toggle-label">API(s) favorites</span>
        </button>

        <div id="favoris-content" class="favoris-content">
          <ul id="liste-favoris">
            <li>
              <span title="Voir la favorite">API 1</span>
              <button class="btn-supprimer-favori" type="button" title="Supprimer le favori" aria-label="Supprimer API 1">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <line x1="18" y1="6" x2="6" y2="18"></line>
                  <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
              </button>
            </li>
            <li>
              <span title="Voir la favorite">API 2</span>
              <button class="btn-supprimer-favori" type="button" title="Supprimer le favori" aria-label="Supprimer API 2">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <line x1="18" y1="6" x2="6" y2="18"></line>
                  <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
              </button>
            </li>
            <li>
              <span title="Voir la favorite">API 3</span>
              <button class="btn-supprimer-favori" type="button" title="Supprimer le favori" aria-label="Supprimer API 3">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <line x1="18" y1="6" x2="6" y2="18"></line>
                  <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
              </button>
            </li>
          </ul>
        </div>
      </aside>
    </main>

    <script src="api.js"></script>
  </body>
</html>
