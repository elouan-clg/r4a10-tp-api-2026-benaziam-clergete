<!DOCTYPE html>
<html lang="fr" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CROUS - Trouvez votre restaurant universitaire</title>
    <link rel="shortcut icon" type="image/x-icon" href="favicon-js.ico" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <!-- HERO SECTION -->
    <header id="hero">
      <div class="hero-content">
        <h1>CROUS</h1>
        <p>Trouvez les meilleurs restaurants universitaires près de vous</p>
        
        <div id="bloc-recherche">
          <input id="recherche" type="text" placeholder="Ex: grenoble, lyon, paris..." />
        
          <button id="btn-lancer-recherche" type="button" class="btn_clicable" title="Lancer la recherche">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.35-4.35"></path>
            </svg>
          </button>
        
          <div class="favoris-dropdown">
            <button id="btn-toggle-favoris" class="toggle-btn" aria-expanded="false">
              <span class="toggle-icon">▼</span>
              <span class="toggle-label">Mes favoris</span>
            </button>
        
            <div id="favoris-content" class="favoris-content">
              <ul id="liste-favoris">
                <li>Test 1</li>
              </ul>
              <p class="info-vide">(Aucun favori)</p>
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- MAIN CONTENT -->
    <main id="conteneur">
      <!-- SECTION RÉSULTATS -->
      <section id="section-resultats">
        <div id="bloc-gif-attente">
          <img src="images/attente-ajax.gif" alt="Chargement" width="50" />
        </div>

        <div id="bloc-resultats">
        </div>
      </section>
    </main>

    <!-- FOOTER -->
    <footer id="footer">
      <div class="footer-content">
        <p>Données alimentées par <a href="https://croustillant.bayfield.dev/fr" target="_blank" rel="noopener noreferrer">CROUStillant</a></p>
        <p>Un projet open-source créé par <a href="https://github.com/CROUStillant-Developpement" target="_blank" rel="noopener noreferrer">Paul Bayfield</a></p>
        <p class="footer-secondary">Informations sur les restaurants universitaires du CROUS en France et en Outre-Mer</p>
      </div>
    </footer>

    <script type="module" src="./js/main.js"></script>
    <script type="module" src="./js/appel_region.js"></script>
  </body>
</html>
